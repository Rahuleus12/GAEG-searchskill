<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
    </head>
    <body>
        <script>
            window.ai_edge_gallery_get_result = async function (data) {
                // ── Parse input ───────────────────────────────────────────────────────────
                let query = "",
                    type = "",
                    url = "";
                try {
                    const parsed =
                        typeof data === "string" ? JSON.parse(data) : data;
                    query = (parsed.query || "").trim();
                    type = (parsed.type || "").trim().toLowerCase();
                    url = (parsed.url || "").trim();
                } catch (e) {
                    return JSON.stringify({
                        error: "Could not parse input data.",
                    });
                }
                if (!query && !url)
                    return JSON.stringify({
                        error: "No query or URL provided.",
                    });

                // ── Extract YouTube URL from query if embedded in text ────────────────────
                if (!url) {
                    const match = query.match(
                        /https?:\/\/(www\.)?(youtube\.com\/watch\?v=|youtu\.be\/)[\w-]+/,
                    );
                    if (match) url = match[0];
                }

                // ── Auto-detect type ──────────────────────────────────────────────────────
                const isYouTube =
                    type === "youtube" ||
                    /youtube\.com|youtu\.be/i.test(url) ||
                    /\byoutube\b|\byoutu\.be\b|\byt\b.*video|video.*\byt\b/i.test(
                        query,
                    );

                const isWeather =
                    type === "weather" ||
                    /\bweather\b|\btemperature\b|\bforecast\b|\brain today\b|\bhumidity\b/i.test(
                        query,
                    );

                const isNews =
                    type === "news" ||
                    /\bnews\b|\blatest\b|\bbreaking\b|\bheadlines?\b|\brecent\b|\bcurrent events?\b|\bwhat happened\b/i.test(
                        query,
                    );

                // ══════════════════════════════════════════════════════════════════════════
                // 1. YOUTUBE — noembed.com (confirmed CORS-open proxy, no key needed)
                // ══════════════════════════════════════════════════════════════════════════
                if (isYouTube) {
                    if (!url) {
                        return JSON.stringify({
                            error: "Please include the YouTube video URL in your message, e.g. 'get info for https://youtu.be/abc123'",
                        });
                    }
                    try {
                        // noembed.com is a CORS-open oEmbed proxy — works reliably in webviews
                        const noembedUrl = `https://noembed.com/embed?url=${encodeURIComponent(url)}&format=json`;
                        const res = await fetch(noembedUrl);
                        if (!res.ok) throw new Error(`HTTP ${res.status}`);
                        const v = await res.json();

                        if (v.error)
                            return JSON.stringify({
                                error: `YouTube info not available: ${v.error}`,
                            });

                        // Extract video ID for thumbnail fallback
                        const vidIdMatch = url.match(
                            /(?:v=|youtu\.be\/)([^&?/]+)/,
                        );
                        const videoId = vidIdMatch ? vidIdMatch[1] : null;
                        const thumbnail = videoId
                            ? `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`
                            : v.thumbnail_url || "";

                        return JSON.stringify({
                            result: {
                                source: "SKILL_EXECUTED",
                                type: "youtube",
                                title: v.title || "Unknown title",
                                channel: v.author_name || "Unknown channel",
                                channel_url: v.author_url || "",
                                thumbnail,
                                video_url: url,
                                width: v.width,
                                height: v.height,
                            },
                        });
                    } catch (e) {
                        return JSON.stringify({
                            error: `YouTube lookup failed: ${e.message}. Check the URL is public and correct.`,
                        });
                    }
                }

                // ══════════════════════════════════════════════════════════════════════════
                // 2. WEATHER — Open-Meteo (no key, confirmed CORS-open)
                // ══════════════════════════════════════════════════════════════════════════
                if (isWeather) {
                    try {
                        const location =
                            query
                                .replace(
                                    /\bweather\b|\bcurrent\b|\btoday\b|\bforecast\b|\btemperature\b|\bin\b|\bfor\b|\bat\b/gi,
                                    "",
                                )
                                .trim() || query;

                        const geoRes = await fetch(
                            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(location)}&count=1&language=en&format=json`,
                        );
                        const geoData = await geoRes.json();
                        if (!geoData.results?.length)
                            return JSON.stringify({
                                error: `Location not found: "${location}". Try a city name like "Mumbai" or "Tokyo".`,
                            });

                        const { latitude, longitude, name, country, timezone } =
                            geoData.results[0];
                        const wRes = await fetch(
                            `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature&wind_speed_unit=kmh&timezone=${encodeURIComponent(timezone)}`,
                        );
                        const w = (await wRes.json()).current;

                        const codes = {
                            0: "Clear sky",
                            1: "Mainly clear",
                            2: "Partly cloudy",
                            3: "Overcast",
                            45: "Foggy",
                            48: "Icy fog",
                            51: "Light drizzle",
                            53: "Moderate drizzle",
                            55: "Dense drizzle",
                            61: "Slight rain",
                            63: "Moderate rain",
                            65: "Heavy rain",
                            71: "Slight snow",
                            73: "Moderate snow",
                            75: "Heavy snow",
                            80: "Slight showers",
                            81: "Moderate showers",
                            82: "Violent showers",
                            95: "Thunderstorm",
                            96: "Thunderstorm with hail",
                            99: "Thunderstorm with heavy hail",
                        };

                        return JSON.stringify({
                            result: {
                                source: "SKILL_EXECUTED",
                                type: "weather",
                                location: `${name}, ${country}`,
                                condition: codes[w.weather_code] ?? "Unknown",
                                temperature_c: w.temperature_2m,
                                feels_like_c: w.apparent_temperature,
                                humidity_percent: w.relative_humidity_2m,
                                wind_kmh: w.wind_speed_10m,
                                updated: w.time,
                                source_url: "https://open-meteo.com",
                            },
                        });
                    } catch (e) {
                        return JSON.stringify({
                            error: `Weather lookup failed: ${e.message}`,
                        });
                    }
                }

                // ══════════════════════════════════════════════════════════════════════════
                // 3. NEWS — Wikipedia OpenSearch + Page Summaries (confirmed CORS-open)
                //    Uses Wikipedia's live search which surfaces recent topics & events
                // ══════════════════════════════════════════════════════════════════════════
                if (isNews) {
                    let articles = [];

                    // Step 1: OpenSearch to find matching article titles
                    try {
                        const searchRes = await fetch(
                            `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=4&format=json&origin=*`,
                        );
                        const [, titles, , links] = await searchRes.json();

                        // Step 2: Fetch summary for each result
                        for (let i = 0; i < Math.min(titles.length, 3); i++) {
                            try {
                                const sumRes = await fetch(
                                    `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(titles[i].replace(/ /g, "_"))}`,
                                );
                                if (!sumRes.ok) continue;
                                const s = await sumRes.json();
                                articles.push({
                                    title: s.title,
                                    snippet: s.extract
                                        ? s.extract.substring(0, 300)
                                        : "",
                                    url:
                                        s.content_urls?.desktop?.page ||
                                        links[i] ||
                                        "",
                                    source: "Wikipedia",
                                });
                            } catch (e) {}
                        }
                    } catch (e) {}

                    // Step 3: DuckDuckGo for additional context
                    if (articles.length < 2) {
                        try {
                            const ddg = await (
                                await fetch(
                                    `https://api.duckduckgo.com/?q=${encodeURIComponent(query + " news")}&format=json&no_html=1&skip_disambig=1`,
                                )
                            ).json();
                            if (ddg.AbstractText) {
                                articles.push({
                                    title: ddg.Heading || query,
                                    snippet: ddg.AbstractText,
                                    url: ddg.AbstractURL || "",
                                    source: "DuckDuckGo",
                                });
                            }
                            for (const t of (ddg.RelatedTopics || []).slice(
                                0,
                                3,
                            )) {
                                if (t.Text && t.FirstURL)
                                    articles.push({
                                        title: t.Text.substring(0, 80),
                                        snippet: t.Text,
                                        url: t.FirstURL,
                                        source: "DuckDuckGo",
                                    });
                            }
                        } catch (e) {}
                    }

                    if (!articles.length)
                        return JSON.stringify({
                            error: `No news results found for "${query}". Try more specific keywords.`,
                        });

                    return JSON.stringify({
                        result: {
                            source: "SKILL_EXECUTED",
                            type: "news",
                            query,
                            note: "Results from Wikipedia and DuckDuckGo. For live breaking news, include a specific topic.",
                            articles: articles.slice(0, 5),
                        },
                    });
                }

                // ══════════════════════════════════════════════════════════════════════════
                // 4. GENERAL — DuckDuckGo → Wikipedia fallback
                // ══════════════════════════════════════════════════════════════════════════
                let results = [];

                try {
                    const ddg = await (
                        await fetch(
                            `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`,
                        )
                    ).json();
                    if (ddg.AbstractText)
                        results.push({
                            title: ddg.Heading || query,
                            snippet: ddg.AbstractText,
                            url: ddg.AbstractURL || "",
                        });
                    for (const t of (ddg.RelatedTopics || []).slice(0, 4)) {
                        if (t.Text && t.FirstURL)
                            results.push({
                                title: t.Text.substring(0, 80),
                                snippet: t.Text,
                                url: t.FirstURL,
                            });
                        for (const s of (t.Topics || []).slice(0, 2))
                            if (s.Text && s.FirstURL)
                                results.push({
                                    title: s.Text.substring(0, 80),
                                    snippet: s.Text,
                                    url: s.FirstURL,
                                });
                    }
                    if (ddg.Answer && !results.length)
                        results.push({
                            title: "Answer",
                            snippet: ddg.Answer,
                            url: "",
                        });
                } catch (e) {}

                if (!results.length) {
                    try {
                        const w = await (
                            await fetch(
                                `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=3`,
                            )
                        ).json();
                        results = (w.query?.search || []).map((h) => ({
                            title: h.title,
                            snippet: h.snippet.replace(/<[^>]+>/g, ""),
                            url: `https://en.wikipedia.org/wiki/${encodeURIComponent(h.title.replace(/ /g, "_"))}`,
                        }));
                    } catch (e) {}
                }

                if (!results.length)
                    return JSON.stringify({
                        error: `No results found for "${query}". Try different keywords.`,
                    });

                return JSON.stringify({
                    result: {
                        source: "SKILL_EXECUTED",
                        type: "general",
                        query,
                        results: results.slice(0, 5),
                    },
                });
            };
        </script>
    </body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
    </head>
    <body>
        <script>
            window.ai_edge_gallery_get_result = async function (data) {
                let query = "",
                    type = "",
                    url = "";
                try {
                    const parsed =
                        typeof data === "string" ? JSON.parse(data) : data;
                    query = (parsed.query || "").trim();
                    type = (parsed.type || "").trim().toLowerCase();
                    url = (parsed.url || "").trim();
                } catch (e) {
                    return JSON.stringify({
                        error: "Parse failed: " + e.message,
                    });
                }

                // ── Extract YouTube URL from anywhere in the query ────────────────────────
                if (!url) {
                    const m = query.match(
                        /https?:\/\/(www\.)?(youtube\.com\/watch\?v=|youtu\.be\/)[\w-]+/,
                    );
                    if (m) url = m[0];
                }

                const isYouTube =
                    type === "youtube" ||
                    /youtube\.com|youtu\.be/i.test(url) ||
                    /\byoutube\b/i.test(query);
                const isWeather =
                    type === "weather" ||
                    /\bweather\b|\bforecast\b|\btemperature\b/i.test(query);
                const isNews =
                    type === "news" ||
                    /\bnews\b|\blatest\b|\bbreaking\b|\bheadlines?\b/i.test(
                        query,
                    );

                // ── STEP 1: confirm skill is running with a fetch test ────────────────────
                // Try Wikipedia first — we know it works — to confirm fetch itself works
                let fetchWorking = false;
                try {
                    const test = await fetch(
                        "https://en.wikipedia.org/api/rest_v1/page/summary/Test?origin=*",
                    );
                    fetchWorking = test.ok;
                } catch (e) {}

                // ══════════════════════════════════════════════════════════════════════════
                // YOUTUBE
                // ══════════════════════════════════════════════════════════════════════════
                if (isYouTube) {
                    if (!url) {
                        return JSON.stringify({
                            result: {
                                source: "SKILL_EXECUTED",
                                type: "youtube",
                                error: "No URL found. Paste the full YouTube URL in your message.",
                                fetch_working: fetchWorking,
                            },
                        });
                    }

                    // Extract video ID
                    const vidIdMatch = url.match(
                        /(?:v=|youtu\.be\/)([^&?/\s]+)/,
                    );
                    const videoId = vidIdMatch ? vidIdMatch[1] : null;

                    if (!videoId) {
                        return JSON.stringify({
                            result: {
                                source: "SKILL_EXECUTED",
                                type: "youtube",
                                error:
                                    "Could not extract video ID from: " + url,
                            },
                        });
                    }

                    // Try 3 different endpoints in order, report which one worked
                    let tried = [];

                    // Attempt 1: noembed.com
                    try {
                        const r = await fetch(
                            `https://noembed.com/embed?url=${encodeURIComponent(url)}&format=json`,
                        );
                        if (r.ok) {
                            const v = await r.json();
                            if (v.title) {
                                return JSON.stringify({
                                    result: {
                                        source: "SKILL_EXECUTED",
                                        type: "youtube",
                                        via: "noembed.com",
                                        title: v.title,
                                        channel: v.author_name,
                                        channel_url: v.author_url,
                                        thumbnail: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
                                        video_url: url,
                                    },
                                });
                            }
                        }
                        tried.push("noembed: " + r.status);
                    } catch (e) {
                        tried.push("noembed: " + e.message);
                    }

                    // Attempt 2: youtube.com/oembed directly
                    try {
                        const r = await fetch(
                            `https://www.youtube.com/oembed?url=${encodeURIComponent(url)}&format=json`,
                        );
                        if (r.ok) {
                            const v = await r.json();
                            if (v.title) {
                                return JSON.stringify({
                                    result: {
                                        source: "SKILL_EXECUTED",
                                        type: "youtube",
                                        via: "youtube.com/oembed",
                                        title: v.title,
                                        channel: v.author_name,
                                        channel_url: v.author_url,
                                        thumbnail: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
                                        video_url: url,
                                    },
                                });
                            }
                        }
                        tried.push("yt-oembed: " + r.status);
                    } catch (e) {
                        tried.push("yt-oembed: " + e.message);
                    }

                    // Attempt 3: Return what we CAN get without any API
                    // Video ID + thumbnail URL (img.youtube.com has no CORS)
                    return JSON.stringify({
                        result: {
                            source: "SKILL_EXECUTED",
                            type: "youtube",
                            note: "Could not fetch title (API blocked). Video ID and thumbnail available.",
                            video_id: videoId,
                            thumbnail: `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`,
                            video_url: url,
                            watch_url: `https://www.youtube.com/watch?v=${videoId}`,
                            tried,
                        },
                    });
                }

                // ══════════════════════════════════════════════════════════════════════════
                // WEATHER
                // ══════════════════════════════════════════════════════════════════════════
                if (isWeather) {
                    try {
                        const location =
                            query
                                .replace(
                                    /\bweather\b|\bcurrent\b|\btoday\b|\bforecast\b|\btemperature\b|\bin\b|\bfor\b|\bat\b/gi,
                                    "",
                                )
                                .trim() || query;
                        const geoRes = await fetch(
                            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(location)}&count=1&language=en&format=json`,
                        );
                        const geoData = await geoRes.json();
                        if (!geoData.results?.length)
                            return JSON.stringify({
                                error: `Location not found: "${location}"`,
                            });

                        const { latitude, longitude, name, country, timezone } =
                            geoData.results[0];
                        const wRes = await fetch(
                            `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature&wind_speed_unit=kmh&timezone=${encodeURIComponent(timezone)}`,
                        );
                        const w = (await wRes.json()).current;
                        const codes = {
                            0: "Clear sky",
                            1: "Mainly clear",
                            2: "Partly cloudy",
                            3: "Overcast",
                            45: "Foggy",
                            48: "Icy fog",
                            51: "Light drizzle",
                            53: "Moderate drizzle",
                            55: "Dense drizzle",
                            61: "Slight rain",
                            63: "Moderate rain",
                            65: "Heavy rain",
                            71: "Slight snow",
                            73: "Moderate snow",
                            75: "Heavy snow",
                            80: "Slight showers",
                            81: "Moderate showers",
                            82: "Violent showers",
                            95: "Thunderstorm",
                            96: "Thunderstorm with hail",
                            99: "Thunderstorm with heavy hail",
                        };

                        return JSON.stringify({
                            result: {
                                source: "SKILL_EXECUTED",
                                type: "weather",
                                location: `${name}, ${country}`,
                                condition: codes[w.weather_code] ?? "Unknown",
                                temperature_c: w.temperature_2m,
                                feels_like_c: w.apparent_temperature,
                                humidity_percent: w.relative_humidity_2m,
                                wind_kmh: w.wind_speed_10m,
                                updated: w.time,
                                source_url: "https://open-meteo.com",
                            },
                        });
                    } catch (e) {
                        return JSON.stringify({
                            error: "Weather failed: " + e.message,
                        });
                    }
                }

                // ══════════════════════════════════════════════════════════════════════════
                // NEWS — Wikipedia summary (confirmed working) + DuckDuckGo
                // ══════════════════════════════════════════════════════════════════════════
                if (isNews) {
                    let articles = [];
                    let tried = [];

                    // Wikipedia OpenSearch
                    try {
                        const sr = await fetch(
                            `https://en.wikipedia.org/w/api.php?action=opensearch&search=${encodeURIComponent(query)}&limit=5&format=json&origin=*`,
                        );
                        const [, titles, descs, links] = await sr.json();
                        for (let i = 0; i < Math.min(titles.length, 3); i++) {
                            try {
                                const s = await fetch(
                                    `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(titles[i].replace(/ /g, "_"))}`,
                                );
                                if (s.ok) {
                                    const p = await s.json();
                                    articles.push({
                                        title: p.title,
                                        snippet: (p.extract || "").substring(
                                            0,
                                            300,
                                        ),
                                        url:
                                            p.content_urls?.desktop?.page ||
                                            links[i],
                                        source: "Wikipedia",
                                    });
                                }
                            } catch (e) {}
                        }
                        tried.push(
                            "wikipedia: ok, " + articles.length + " results",
                        );
                    } catch (e) {
                        tried.push("wikipedia: " + e.message);
                    }

                    // DuckDuckGo
                    try {
                        const ddg = await (
                            await fetch(
                                `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`,
                            )
                        ).json();
                        if (ddg.AbstractText)
                            articles.push({
                                title: ddg.Heading || query,
                                snippet: ddg.AbstractText,
                                url: ddg.AbstractURL || "",
                                source: "DuckDuckGo",
                            });
                        for (const t of (ddg.RelatedTopics || []).slice(0, 3))
                            if (t.Text && t.FirstURL)
                                articles.push({
                                    title: t.Text.substring(0, 80),
                                    snippet: t.Text,
                                    url: t.FirstURL,
                                    source: "DuckDuckGo",
                                });
                        tried.push("duckduckgo: ok");
                    } catch (e) {
                        tried.push("duckduckgo: " + e.message);
                    }

                    if (!articles.length)
                        return JSON.stringify({
                            error: `No news results for "${query}". Tried: ${tried.join(", ")}`,
                        });

                    return JSON.stringify({
                        result: {
                            source: "SKILL_EXECUTED",
                            type: "news",
                            query,
                            tried,
                            articles: articles.slice(0, 5),
                        },
                    });
                }

                // ══════════════════════════════════════════════════════════════════════════
                // GENERAL — DuckDuckGo → Wikipedia
                // ══════════════════════════════════════════════════════════════════════════
                let results = [];
                try {
                    const ddg = await (
                        await fetch(
                            `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`,
                        )
                    ).json();
                    if (ddg.AbstractText)
                        results.push({
                            title: ddg.Heading || query,
                            snippet: ddg.AbstractText,
                            url: ddg.AbstractURL || "",
                        });
                    for (const t of (ddg.RelatedTopics || []).slice(0, 4)) {
                        if (t.Text && t.FirstURL)
                            results.push({
                                title: t.Text.substring(0, 80),
                                snippet: t.Text,
                                url: t.FirstURL,
                            });
                        for (const s of (t.Topics || []).slice(0, 2))
                            if (s.Text && s.FirstURL)
                                results.push({
                                    title: s.Text.substring(0, 80),
                                    snippet: s.Text,
                                    url: s.FirstURL,
                                });
                    }
                    if (ddg.Answer && !results.length)
                        results.push({
                            title: "Answer",
                            snippet: ddg.Answer,
                            url: "",
                        });
                } catch (e) {}

                if (!results.length) {
                    try {
                        const w = await (
                            await fetch(
                                `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=3`,
                            )
                        ).json();
                        results = (w.query?.search || []).map((h) => ({
                            title: h.title,
                            snippet: h.snippet.replace(/<[^>]+>/g, ""),
                            url: `https://en.wikipedia.org/wiki/${encodeURIComponent(h.title.replace(/ /g, "_"))}`,
                        }));
                    } catch (e) {}
                }

                if (!results.length)
                    return JSON.stringify({
                        error: `No results for "${query}".`,
                    });
                return JSON.stringify({
                    result: {
                        source: "SKILL_EXECUTED",
                        type: "general",
                        query,
                        results: results.slice(0, 5),
                    },
                });
            };
        </script>
    </body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
    </head>
    <body>
        <script>
            (async () => {
                function done(obj) {
                    skill.postMessage(JSON.stringify(obj));
                }

                let query = "";
                try {
                    const parsed =
                        typeof data === "string" ? JSON.parse(data) : data;
                    query = (parsed.query || "").trim();
                } catch (e) {
                    done({ error: "Could not parse input.", results: [] });
                    return;
                }

                if (!query) {
                    done({ error: "No query provided.", results: [] });
                    return;
                }

                let results = [];

                // 1. Try DuckDuckGo
                try {
                    const url = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                    const res = await fetch(url);
                    const ddg = await res.json();

                    if (ddg.AbstractText) {
                        results.push({
                            title: ddg.Heading || query,
                            snippet: ddg.AbstractText,
                            url: ddg.AbstractURL || "",
                        });
                    }

                    for (const t of (ddg.RelatedTopics || []).slice(0, 4)) {
                        if (t.Text && t.FirstURL) {
                            results.push({
                                title: t.Text.substring(0, 80),
                                snippet: t.Text,
                                url: t.FirstURL,
                            });
                        }
                        for (const s of (t.Topics || []).slice(0, 2)) {
                            if (s.Text && s.FirstURL) {
                                results.push({
                                    title: s.Text.substring(0, 80),
                                    snippet: s.Text,
                                    url: s.FirstURL,
                                });
                            }
                        }
                    }

                    if (ddg.Answer && results.length === 0) {
                        results.push({
                            title: "Answer",
                            snippet: ddg.Answer,
                            url: "",
                        });
                    }
                } catch (e) {}

                // 2. Fallback to Wikipedia
                if (results.length === 0) {
                    try {
                        const url = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=3`;
                        const res = await fetch(url);
                        const wiki = await res.json();
                        for (const h of wiki.query?.search || []) {
                            results.push({
                                title: h.title,
                                snippet: h.snippet.replace(/<[^>]+>/g, ""),
                                url: `https://en.wikipedia.org/wiki/${encodeURIComponent(h.title.replace(/ /g, "_"))}`,
                            });
                        }
                    } catch (e) {}
                }

                if (results.length === 0) {
                    done({
                        query,
                        error: "No results found. Try a different search term.",
                        results: [],
                    });
                } else {
                    done({ query, results: results.slice(0, 5) });
                }
            })();
        </script>
    </body>
</html>

<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
    </head>
    <body>
        <script>
            window.ai_edge_gallery_get_result = async function (data) {
                // ── Parse input ───────────────────────────────────────────────────────────
                let query = "",
                    type = "",
                    url = "";
                try {
                    const parsed =
                        typeof data === "string" ? JSON.parse(data) : data;
                    query = (parsed.query || "").trim();
                    type = (parsed.type || "").trim().toLowerCase();
                    url = (parsed.url || "").trim();
                } catch (e) {
                    return JSON.stringify({
                        error: "Could not parse input data.",
                    });
                }
                if (!query && !url)
                    return JSON.stringify({
                        error: "No query or URL provided.",
                    });

                // ── Auto-detect type ──────────────────────────────────────────────────────
                const isYouTube =
                    type === "youtube" ||
                    /youtube\.com|youtu\.be/i.test(url) ||
                    /youtube|youtu\.be|yt video|youtube link/i.test(query);

                const isWeather =
                    type === "weather" ||
                    /\bweather\b|\btemperature\b|\bforecast\b|\brain\b|\bhumidity\b/i.test(
                        query,
                    );

                const isNews =
                    type === "news" ||
                    /\bnews\b|\blatest\b|\bbreaking\b|\bheadlines?\b|\btoday\b|\brecent\b|\bcurrent events?\b|\bupdate\b/i.test(
                        query,
                    );

                // ══════════════════════════════════════════════════════════════════════════
                // 1. YOUTUBE — oEmbed (no key, no CORS issues)
                // ══════════════════════════════════════════════════════════════════════════
                if (isYouTube) {
                    // Extract URL from query if not passed directly
                    const videoUrl =
                        url || (query.match(/https?:\/\/[^\s]+/)?.[0] ?? "");

                    if (!videoUrl) {
                        return JSON.stringify({
                            error: "Please provide a YouTube video URL, e.g. 'get info for https://youtu.be/xxxxx'",
                        });
                    }

                    try {
                        const oembedUrl = `https://www.youtube.com/oembed?url=${encodeURIComponent(videoUrl)}&format=json`;
                        const res = await fetch(oembedUrl);
                        if (!res.ok)
                            return JSON.stringify({
                                error: "Could not fetch YouTube video info. Check the URL is valid and public.",
                            });
                        const v = await res.json();

                        return JSON.stringify({
                            result: {
                                source: "SKILL_EXECUTED",
                                type: "youtube",
                                title: v.title,
                                channel: v.author_name,
                                channel_url: v.author_url,
                                thumbnail: v.thumbnail_url,
                                video_url: videoUrl,
                                provider: v.provider_name,
                            },
                        });
                    } catch (e) {
                        return JSON.stringify({
                            error: `YouTube lookup failed: ${e.message}`,
                        });
                    }
                }

                // ══════════════════════════════════════════════════════════════════════════
                // 2. WEATHER — Open-Meteo (no key)
                // ══════════════════════════════════════════════════════════════════════════
                if (isWeather) {
                    try {
                        const location =
                            query
                                .replace(
                                    /\bweather\b|\bcurrent\b|\btoday\b|\bforecast\b|\btemperature\b|\bin\b|\bfor\b|\bat\b/gi,
                                    "",
                                )
                                .trim() || query;

                        const geoRes = await fetch(
                            `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(location)}&count=1&language=en&format=json`,
                        );
                        const geoData = await geoRes.json();
                        if (!geoData.results?.length)
                            return JSON.stringify({
                                error: `Location not found: "${location}". Try a more specific city name.`,
                            });

                        const { latitude, longitude, name, country, timezone } =
                            geoData.results[0];
                        const wRes = await fetch(
                            `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,apparent_temperature&wind_speed_unit=kmh&timezone=${encodeURIComponent(timezone)}`,
                        );
                        const w = (await wRes.json()).current;

                        const codes = {
                            0: "Clear sky",
                            1: "Mainly clear",
                            2: "Partly cloudy",
                            3: "Overcast",
                            45: "Foggy",
                            48: "Icy fog",
                            51: "Light drizzle",
                            53: "Moderate drizzle",
                            55: "Dense drizzle",
                            61: "Slight rain",
                            63: "Moderate rain",
                            65: "Heavy rain",
                            71: "Slight snow",
                            73: "Moderate snow",
                            75: "Heavy snow",
                            80: "Slight showers",
                            81: "Moderate showers",
                            82: "Violent showers",
                            95: "Thunderstorm",
                            96: "Thunderstorm with hail",
                            99: "Thunderstorm with heavy hail",
                        };

                        return JSON.stringify({
                            result: {
                                source: "SKILL_EXECUTED",
                                type: "weather",
                                location: `${name}, ${country}`,
                                condition: codes[w.weather_code] || "Unknown",
                                temperature_c: w.temperature_2m,
                                feels_like_c: w.apparent_temperature,
                                humidity_percent: w.relative_humidity_2m,
                                wind_kmh: w.wind_speed_10m,
                                updated: w.time,
                                source_url: "https://open-meteo.com",
                            },
                        });
                    } catch (e) {
                        return JSON.stringify({
                            error: `Weather lookup failed: ${e.message}`,
                        });
                    }
                }

                // ══════════════════════════════════════════════════════════════════════════
                // 3. NEWS — HackerNews (tech) + Wikipedia search
                // ══════════════════════════════════════════════════════════════════════════
                if (isNews) {
                    let articles = [];

                    // HackerNews Algolia search API — free, no key, open CORS
                    try {
                        const hnUrl = `https://hn.algolia.com/api/v1/search?query=${encodeURIComponent(query)}&tags=story&hitsPerPage=5`;
                        const hnRes = await fetch(hnUrl);
                        const hn = await hnRes.json();

                        for (const hit of (hn.hits || []).slice(0, 5)) {
                            if (hit.title) {
                                articles.push({
                                    title: hit.title,
                                    snippet: hit.story_text
                                        ? hit.story_text
                                              .replace(/<[^>]+>/g, "")
                                              .substring(0, 200)
                                        : `Score: ${hit.points} | Comments: ${hit.num_comments}`,
                                    url:
                                        hit.url ||
                                        `https://news.ycombinator.com/item?id=${hit.objectID}`,
                                    source: "Hacker News",
                                    date:
                                        hit.created_at?.substring(0, 10) || "",
                                });
                            }
                        }
                    } catch (e) {}

                    // Wikipedia search as general knowledge fallback
                    if (articles.length < 3) {
                        try {
                            const wikiUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=3`;
                            const wikiRes = await fetch(wikiUrl);
                            const wiki = await wikiRes.json();
                            for (const h of wiki.query?.search || []) {
                                articles.push({
                                    title: h.title,
                                    snippet: h.snippet.replace(/<[^>]+>/g, ""),
                                    url: `https://en.wikipedia.org/wiki/${encodeURIComponent(h.title.replace(/ /g, "_"))}`,
                                    source: "Wikipedia",
                                });
                            }
                        } catch (e) {}
                    }

                    if (!articles.length)
                        return JSON.stringify({
                            error: `No news found for "${query}". Try different keywords.`,
                        });

                    return JSON.stringify({
                        result: {
                            source: "SKILL_EXECUTED",
                            type: "news",
                            query,
                            articles: articles.slice(0, 6),
                        },
                    });
                }

                // ══════════════════════════════════════════════════════════════════════════
                // 4. GENERAL — DuckDuckGo → Wikipedia fallback
                // ══════════════════════════════════════════════════════════════════════════
                let results = [];

                try {
                    const ddg = await (
                        await fetch(
                            `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`,
                        )
                    ).json();

                    if (ddg.AbstractText)
                        results.push({
                            title: ddg.Heading || query,
                            snippet: ddg.AbstractText,
                            url: ddg.AbstractURL || "",
                        });

                    for (const t of (ddg.RelatedTopics || []).slice(0, 4)) {
                        if (t.Text && t.FirstURL)
                            results.push({
                                title: t.Text.substring(0, 80),
                                snippet: t.Text,
                                url: t.FirstURL,
                            });
                        for (const s of (t.Topics || []).slice(0, 2))
                            if (s.Text && s.FirstURL)
                                results.push({
                                    title: s.Text.substring(0, 80),
                                    snippet: s.Text,
                                    url: s.FirstURL,
                                });
                    }

                    if (ddg.Answer && !results.length)
                        results.push({
                            title: "Answer",
                            snippet: ddg.Answer,
                            url: "",
                        });
                } catch (e) {}

                // Wikipedia fallback
                if (!results.length) {
                    try {
                        const w = await (
                            await fetch(
                                `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=3`,
                            )
                        ).json();
                        results = (w.query?.search || []).map((h) => ({
                            title: h.title,
                            snippet: h.snippet.replace(/<[^>]+>/g, ""),
                            url: `https://en.wikipedia.org/wiki/${encodeURIComponent(h.title.replace(/ /g, "_"))}`,
                        }));
                    } catch (e) {}
                }

                if (!results.length)
                    return JSON.stringify({
                        error: `No results found for "${query}". Try a different search term.`,
                    });

                return JSON.stringify({
                    result: {
                        source: "SKILL_EXECUTED",
                        type: "general",
                        query,
                        results: results.slice(0, 5),
                    },
                });
            };
        </script>
    </body>
</html>

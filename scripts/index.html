<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
    </head>
    <body>
        <script>
            window.ai_edge_gallery_get_result = async function (data) {
                let query = "";
                try {
                    const parsed =
                        typeof data === "string" ? JSON.parse(data) : data;
                    query = (parsed.query || "").trim();
                } catch (e) {
                    return JSON.stringify({
                        error: "Could not parse input data.",
                    });
                }

                if (!query) {
                    return JSON.stringify({ error: "No query provided." });
                }

                let results = [];

                // 1. DuckDuckGo Instant Answer API
                try {
                    const ddgUrl = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
                    const ddgRes = await fetch(ddgUrl);
                    const ddg = await ddgRes.json();

                    if (ddg.AbstractText) {
                        results.push({
                            title: ddg.Heading || query,
                            snippet: ddg.AbstractText,
                            url: ddg.AbstractURL || "",
                        });
                    }

                    for (const t of (ddg.RelatedTopics || []).slice(0, 4)) {
                        if (t.Text && t.FirstURL) {
                            results.push({
                                title: t.Text.substring(0, 80),
                                snippet: t.Text,
                                url: t.FirstURL,
                            });
                        }
                        for (const s of (t.Topics || []).slice(0, 2)) {
                            if (s.Text && s.FirstURL) {
                                results.push({
                                    title: s.Text.substring(0, 80),
                                    snippet: s.Text,
                                    url: s.FirstURL,
                                });
                            }
                        }
                    }

                    if (ddg.Answer && results.length === 0) {
                        results.push({
                            title: "Answer",
                            snippet: ddg.Answer,
                            url: "",
                        });
                    }
                } catch (e) {
                    // DuckDuckGo failed, fall through to Wikipedia
                }

                // 2. Wikipedia fallback
                if (results.length === 0) {
                    try {
                        const wikiUrl = `https://en.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=3`;
                        const wikiRes = await fetch(wikiUrl);
                        const wiki = await wikiRes.json();
                        for (const h of wiki.query?.search || []) {
                            results.push({
                                title: h.title,
                                snippet: h.snippet.replace(/<[^>]+>/g, ""),
                                url: `https://en.wikipedia.org/wiki/${encodeURIComponent(h.title.replace(/ /g, "_"))}`,
                            });
                        }
                    } catch (e) {
                        // Wikipedia also failed
                    }
                }

                if (results.length === 0) {
                    return JSON.stringify({
                        error: `No results found for "${query}". Try a more specific search term.`,
                    });
                }

                return JSON.stringify({
                    result: {
                        query,
                        results: results.slice(0, 5),
                    },
                });
            };
        </script>
    </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"></head>
<body>
<script>
window.ai_edge_gallery_get_result = async (data) => {
    try {
        const input = typeof data === 'string' ? JSON.parse(data) : data;
        const query = input.query || '';
        const includeSnippets = input.include_snippets !== false;

        if (!query || query.trim().length === 0) {
            return JSON.stringify({
                error: 'Please provide a search query.'
            });
        }

        const encodedQuery = encodeURIComponent(query.trim());

        // Fetch from DuckDuckGo Instant Answer API (no API key required)
        const ddgUrl = `https://api.duckduckgo.com/?q=${encodedQuery}&format=json&no_html=1&skip_disambig=1`;
        const ddgResponse = await fetch(ddgUrl);
        const ddgData = await ddgResponse.json();

        // Build search results
        let results = [];

        // Add abstract/answer if available
        if (ddgData.AbstractText) {
            results.push({
                title: ddgData.Heading || 'Overview',
                snippet: ddgData.AbstractText,
                source: ddgData.AbstractURL || 'DuckDuckGo',
                type: 'answer'
            });
        }

        // Add related topics as results
        if (ddgData.RelatedTopics && ddgData.RelatedTopics.length > 0) {
            for (const topic of ddgData.RelatedTopics.slice(0, 8)) {
                if (topic.Text && topic.FirstURL) {
                    results.push({
                        title: topic.Text.replace(/<[^>]*>/g, '').trim(),
                        snippet: '',
                        source: topic.FirstURL,
                        type: 'related'
                    });
                }
            }
        }

        // Add definition if available
        if (ddgData.Definition) {
            results.push({
                title: 'Definition',
                snippet: ddgData.Definition,
                source: ddgData.DefinitionURL || '',
                type: 'definition'
            });
        }

        // Add infobox if available
        if (ddgData.Infobox) {
            results.push({
                title: ddgData.Infobox.title || 'Quick Facts',
                snippet: ddgData.Infobox.content || '',
                source: ddgData.Infobox.url || '',
                type: 'infobox'
            });
        }

        // Also fetch from Wikipedia API for additional context
        let wikiSummary = '';
        try {
            const wikiUrl = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodedQuery}`;
            const wikiResponse = await fetch(wikiUrl, {
                headers: { 'Accept': 'application/json' }
            });
            if (wikiResponse.ok) {
                const wikiData = await wikiResponse.json();
                if (wikiData.extract) {
                    wikiSummary = wikiData.extract;
                    results.unshift({
                        title: wikiData.title || 'Wikipedia Summary',
                        snippet: wikiData.extract,
                        source: wikiData.content_urls?.desktop?.page || `https://en.wikipedia.org/wiki/${encodedQuery}`,
                        type: 'wikipedia'
                    });
                }
            }
        } catch (e) {
            // Wikipedia fetch failed, continue without it
        }

        // If no results found, try the DuckDuckGo HTML results page scraping approach
        if (results.length === 0) {
            // Fallback: provide a search link for the user
            results.push({
                title: `Search results for "${query}"`,
                snippet: `No instant answer available. Try searching directly.`,
                source: `https://duckduckgo.com/?q=${encodedQuery}`,
                type: 'search-link'
            });
        }

        // Format the output
        let formattedOutput = `🔍 **Search Results for: "${query}"**\n\n`;

        for (const result of results) {
            const typeIcon = {
                'wikipedia': '📚',
                'answer': '💡',
                'definition': '📖',
                'related': '🔗',
                'infobox': '📊',
                'search-link': '🔎'
            }[result.type] || '•';

            formattedOutput += `${typeIcon} **${result.title}**\n`;
            if (result.snippet) {
                formattedOutput += `${result.snippet}\n`;
            }
            if (result.source) {
                formattedOutput += `Source: ${result.source}\n`;
            }
            formattedOutput += '\n';
        }

        formattedOutput += `---\n*Results powered by DuckDuckGo and Wikipedia APIs.*`;

        return JSON.stringify({
            result: formattedOutput,
            query: query,
            total_results: results.length,
            sources: results.map(r => r.source).filter(Boolean)
        });

    } catch (e) {
        return JSON.stringify({
            error: `Search failed: ${e.message}`
        });
    }
};
</script>
</body>
</html>
